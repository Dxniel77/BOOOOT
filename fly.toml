# fly.toml — VIP Bot · Fly.io config

app = "vip-bot"
primary_region = "mia"

[build]

[env]
  DB_DIR = "/data"

[mounts]
  source = "vip_bot_data"
  destination = "/data"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
